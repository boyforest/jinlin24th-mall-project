# ============================================================
# 金霖二十四养 — Nginx 反向代理
# SSL：Let's Encrypt
# ============================================================

upstream backend {
    server backend:7878;
}
upstream admin {
    server admin-web:80;
}

# ---- acme challenge（certbot 验证用） ----
server {
    listen 80;
    server_name api.jinlin24th.cn admin.jinlin24th.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 小程序 API（HTTPS） ----
server {
    listen 443 ssl http2;
    server_name api.jinlin24th.cn;

    ssl_certificate     /etc/letsencrypt/live/api.jinlin24th.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jinlin24th.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    gzip on;
    gzip_min_length 256;
    gzip_types application/json text/plain;

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_buffers 16 4k;

    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}

# ---- 管理后台（HTTPS） ----
server {
    listen 443 ssl http2;
    server_name admin.jinlin24th.cn;

    ssl_certificate     /etc/letsencrypt/live/api.jinlin24th.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jinlin24th.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/css text/html text/plain;

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
