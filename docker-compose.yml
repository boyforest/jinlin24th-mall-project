name: jinlin24th

services:
  mysql:
    image: mysql:8.4
    container_name: jinlin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jinlin24th}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --default-time-zone=+08:00
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./deploy/mysql/init/02-product-ops.sql:/docker-entrypoint-initdb.d/02-product-ops.sql:ro
      - ./deploy/mysql/init/03-demo-seed.sql:/docker-entrypoint-initdb.d/03-demo-seed.sql:ro
      - ./sql:/docker-entrypoint-initdb.d/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: jinlin-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
      redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
      redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: jinlin24th-backend:latest
    container_name: jinlin-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-jinlin24th}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-1}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      WX_MINIAPP_APPID: ${WX_MINIAPP_APPID:-}
      WX_MINIAPP_SECRET: ${WX_MINIAPP_SECRET:-}
      WX_PAY_ENABLED: ${WX_PAY_ENABLED:-false}
      WX_PAY_MCH_ID: ${WX_PAY_MCH_ID:-}
      WX_PAY_API_V3_KEY: ${WX_PAY_API_V3_KEY:-}
      WX_PAY_SERIAL_NO: ${WX_PAY_SERIAL_NO:-}
      WX_PAY_PRIVATE_KEY_PATH: ${WX_PAY_PRIVATE_KEY_PATH:-}
      WX_PAY_CERTIFICATE_PATH: ${WX_PAY_CERTIFICATE_PATH:-}
      WX_PAY_NOTIFY_URL: ${WX_PAY_NOTIFY_URL:-}
      WX_PAY_REFUND_NOTIFY_URL: ${WX_PAY_REFUND_NOTIFY_URL:-}
      ROCKETMQ_ENABLED: ${ROCKETMQ_ENABLED:-false}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-7878}:7878"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    image: jinlin24th-admin-web:latest
    container_name: jinlin-admin-web
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: jinlin-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - admin-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot

volumes:
  mysql_data:
  redis_data:
  uploads:
  logs:
  certbot-webroot:
