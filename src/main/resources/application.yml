server:
  port: 7878

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 注意：敏感信息不要写死在 application.yml，建议通过环境变量注入
    url: ${DB_URL:jdbc:mysql://localhost:3306/jinlin24th?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}


  # Redis 配置
  data:
    redis:
      # Redis 服务器地址
      host: ${REDIS_HOST:localhost}
      # Redis 端口号
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # Redis 密码（无密码则注释）
      # password: ${REDIS_PASSWORD:}
      # 选择数据库，默认16个库，日常用 db1 隔离业务
      database: ${REDIS_DATABASE:1}
      # 连接超时时间
      timeout: 10000ms
      # 连接池配置
      lettuce:
        pool:
          max-active: 8   # 最大连接数
          max-idle: 8     # 最大空闲连接
          min-idle: 2     # 最小空闲
          max-wait: 3000ms # 获取连接最大等待时间

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinlin24th.jinlin.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:}
    secret: ${WX_MINIAPP_SECRET:}
  pay:
    enabled: ${WX_PAY_ENABLED:false}
    mch-id: ${WX_PAY_MCH_ID:}
    api-v3-key: ${WX_PAY_API_V3_KEY:}
    serial-no: ${WX_PAY_SERIAL_NO:}
    private-key-path: ${WX_PAY_PRIVATE_KEY_PATH:}
    certificate-path: ${WX_PAY_CERTIFICATE_PATH:}
    api-base-url: ${WX_PAY_API_BASE_URL:https://api.mch.weixin.qq.com}
    notify-url: ${WX_PAY_NOTIFY_URL:https://your-domain.com/api/payment/notify}
    refund-notify-url: ${WX_PAY_REFUND_NOTIFY_URL:https://your-domain.com/api/payment/refund/notify}
    sandbox: ${WX_PAY_SANDBOX:false}

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000  # 7天（毫秒）

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  public-url: ${APP_PUBLIC_URL:}
  cache:
    product-entity-ttl-ms: ${PRODUCT_ENTITY_CACHE_TTL_MS:1800000}
    product-detail-ttl-ms: ${PRODUCT_DETAIL_CACHE_TTL_MS:1800000}
    product-sku-ttl-ms: ${PRODUCT_SKU_CACHE_TTL_MS:1800000}
    null-ttl-ms: ${CACHE_NULL_TTL_MS:60000}
  sms:
    code-ttl-seconds: ${SMS_CODE_TTL_SECONDS:300}
  mq:
    enabled: ${ROCKETMQ_ENABLED:false}
    producer-retry-times: ${ROCKETMQ_PRODUCER_RETRY_TIMES:3}
    send-timeout-ms: ${ROCKETMQ_SEND_TIMEOUT_MS:3000}
    order-timeout-cancel-delay-seconds: ${ORDER_TIMEOUT_CANCEL_DELAY_SECONDS:1800}
    topic-order-created: ${ROCKETMQ_TOPIC_ORDER_CREATED:order-created-topic}
    consumer-group-order-created: ${ROCKETMQ_CONSUMER_GROUP_ORDER_CREATED:jinlin-order-created-consumer}
    topic-sms: ${ROCKETMQ_TOPIC_SMS:mall_sms_topic}
    tag-sms-verify-code: ${ROCKETMQ_TAG_SMS_VERIFY_CODE:VERIFY_CODE}
    tag-sms-order-success: ${ROCKETMQ_TAG_SMS_ORDER_SUCCESS:ORDER_SUCCESS}
    consumer-group-sms: ${ROCKETMQ_CONSUMER_GROUP_SMS:mall_sms_consumer_group}
    topic-order-delay: ${ROCKETMQ_TOPIC_ORDER_DELAY:mall_order_delay_topic}
    tag-order-timeout-cancel: ${ROCKETMQ_TAG_ORDER_TIMEOUT_CANCEL:TIMEOUT_CANCEL}
    consumer-group-order-timeout: ${ROCKETMQ_CONSUMER_GROUP_ORDER_TIMEOUT:mall_order_timeout_consumer_group}
    topic-operation-log: ${ROCKETMQ_TOPIC_OPERATION_LOG:mall_operation_log_topic}
    tag-operation-log-crud: ${ROCKETMQ_TAG_OPERATION_LOG_CRUD:ADMIN_CRUD}
    consumer-group-operation-log: ${ROCKETMQ_CONSUMER_GROUP_OPERATION_LOG:mall_operation_log_consumer_group}

---
spring:
  config:
    activate:
      on-profile: mq

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:jinlin-producer}
    retry-times-when-send-failed: ${ROCKETMQ_PRODUCER_RETRY_TIMES_WHEN_SEND_FAILED:2}
    retry-times-when-send-async-failed: ${ROCKETMQ_PRODUCER_RETRY_TIMES_WHEN_SEND_ASYNC_FAILED:2}
